repos:
  # ---------------------------------------------------------------------------
  # omni-secret-scanner (fast mode — no NLP or SAST for pre-commit speed)
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: omni-secret-scanner
        name: omni-secret-scanner (fast)
        entry: omni-scan --fast
        language: system
        pass_filenames: false
        always_run: true

  # ---------------------------------------------------------------------------
  # Standard code hygiene
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key
      - id: no-commit-to-branch
        args: ["--branch", "master"]

  # ---------------------------------------------------------------------------
  # Ruff (linting + formatting)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format
